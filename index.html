<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur ODD 12 - Collège</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .box { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #e19526; font-size: 22px; }
        
        /* Style pour les catégories */
        .ligne { margin: 15px 0; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .resultat { background: #333; color: white; padding: 20px; border-radius: 10px; margin-top: 20px; }
        #total { font-size: 30px; color: #e19526; display: block; }
    </style>
</head>
<body>

<div class="box">
    <h1>Stop au Gâchis (ODD 12)</h1>
    <p>Entrez les pesées du jour en kg :</p>

    <div class="ligne">
        <label>🥗 Déchets alimentaires (plats)</label>
        <input type="number" id="cat1" placeholder="0" oninput="calculer()">
    </div>

    <div class="ligne">
        <label>🥖 Pain</label>
        <input type="number" id="cat2" placeholder="0" oninput="calculer()">
    </div>

    <div class="ligne">
        <label>🧻 Serviettes papier</label>
        <input type="number" id="cat3" placeholder="0" oninput="calculer()">
    </div>

    <div class="ligne">
        <label>🍎 Fruits entamés</label>
        <input type="number" id="cat4" placeholder="0" oninput="calculer()">
    </div>

    <div class="resultat">
        <span>Total gaspillé aujourd'hui :</span>
        <strong id="total">0 kg</strong>
        <p id="phrase"></p>
    </div>
</div>

<script>
    function calculer() {
        // On récupère les 4 valeurs
        let v1 = parseFloat(document.getElementById('cat1').value) || 0;
        let v2 = parseFloat(document.getElementById('cat2').value) || 0;
        let v3 = parseFloat(document.getElementById('cat3').value) || 0;
        let v4 = parseFloat(document.getElementById('cat4').value) || 0;

        // On fait l'addition
        let somme = v1 + v2 + v3 + v4;

        // On affiche le résultat
        document.getElementById('total').innerText = somme.toFixed(2) + " kg";

        // Petite phrase d'impact (un repas = 0.5kg)
        let repas = Math.round(somme / 0.5);
        if(somme > 0) {
            document.getElementById('phrase').innerText = "Cela représente " + repas + " repas jetés.";
        } else {
            document.getElementById('phrase').innerText = "";
        }
    }
</script>

</body>
</html>
